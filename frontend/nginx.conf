server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Cloudflare gerçek IP'yi aktarır
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ----------------------------------------------------------
    # Socket.io — Polling + WebSocket Desteği
    # ÖNEMLI: Her iki transport için de ayrı ayar gerekir.
    # ----------------------------------------------------------

    # Socket.io WebSocket upgrade bağlantıları
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade başlıkları (ZORUNLU)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cloudflare 100s'den önce ping atmak için timeout büyük tutulur
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 15s;

        # Streaming için buffer kapalı (polling + websocket uyumu)
        proxy_buffering off;
        proxy_cache off;
        proxy_ignore_headers X-Accel-Buffering;

        # Bağlantıyı canlı tut
        proxy_socket_keepalive on;

        # Polling için chunked encoding
        chunked_transfer_encoding on;
    }

    # ----------------------------------------------------------
    # REST API
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # ----------------------------------------------------------
    # React SPA (sayfa yenileme 404 sorunu için)
    # ----------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik dosyalar için önbellek
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|webp|avif)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
